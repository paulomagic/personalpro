<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnstile Isolation Test</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .box {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h1>Teste Isolado de CAPTCHA</h1>
    <p>Se o widget abaixo não carregar (ou der erro 400020), o problema é a Chave ou Domínio no painel da Cloudflare.
    </p>

    <div class="box">
        <!-- Chave do Usuário Hardcoded -->
        <div class="cf-turnstile" data-sitekey="0x4AAAAAAACJzK90oAcWumh3m"></div>
    </div>

    <div class="box">
        <h3>Teste com Chave Oficial (Deve funcionar sempre)</h3>
        <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA"></div>
    </div>
</body>

</html>
