name: Docs Auto-Update

on:
  # Roda diariamente às 03:00 UTC (00:00 BRT)
  schedule:
    - cron: '0 3 * * *'
  # Roda também após push na branch principal de desenvolvimento
  push:
    branches:
      - main
      - 'refactor/**'
      - 'feat/**'
    paths:
      - 'services/**'
      - 'supabase/functions/**'
      - 'views/**'
      - 'tests/**'
      - '*.ts'
      - '*.tsx'

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Gerar relatório de mudanças recentes
        id: changes
        run: |
          # Data atual
          TODAY=$(date -u +"%Y-%m-%d")
          TODAY_BRT=$(TZ="America/Sao_Paulo" date +"%Y-%m-%d %H:%M BRT")
          echo "TODAY=$TODAY" >> $GITHUB_OUTPUT
          echo "TODAY_BRT=$TODAY_BRT" >> $GITHUB_OUTPUT

          # Mudanças em arquivos de segurança desde o último commit
          SECURITY_CHANGES=$(git diff HEAD~1 HEAD --name-only 2>/dev/null | grep -E "(auth|security|guard|rate|supabase/functions|lockout|invitation)" | tr '\n' ', ' || echo "nenhuma")
          echo "SECURITY_CHANGES=$SECURITY_CHANGES" >> $GITHUB_OUTPUT

          # Contar arquivos modificados
          CHANGED_COUNT=$(git diff HEAD~1 HEAD --name-only 2>/dev/null | wc -l | tr -d ' ')
          echo "CHANGED_COUNT=$CHANGED_COUNT" >> $GITHUB_OUTPUT

          # Último commit
          LAST_COMMIT=$(git log -1 --pretty=format:"%h — %s" 2>/dev/null || echo "N/A")
          echo "LAST_COMMIT=$LAST_COMMIT" >> $GITHUB_OUTPUT

      - name: Atualizar data nos documentos de segurança
        env:
          TODAY: ${{ steps.changes.outputs.TODAY }}
          TODAY_BRT: ${{ steps.changes.outputs.TODAY_BRT }}
          SECURITY_CHANGES: ${{ steps.changes.outputs.SECURITY_CHANGES }}
          LAST_COMMIT: ${{ steps.changes.outputs.LAST_COMMIT }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const today = process.env.TODAY;
          const todayBrt = process.env.TODAY_BRT;
          const securityChanges = process.env.SECURITY_CHANGES;
          const lastCommit = process.env.LAST_COMMIT;

          // Calcular próxima revisão (14 dias)
          const nextReview = new Date();
          nextReview.setDate(nextReview.getDate() + 14);
          const nextReviewStr = nextReview.toISOString().split('T')[0];

          const docsToUpdate = [
            'SECURITY_CHECKLIST.md',
            'ANALISE_SEGURANCA_COMPLETA.md',
            'VALIDACAO_HARDENING.md',
            'INCIDENT_RESPONSE.md',
          ];

          let updated = [];

          for (const doc of docsToUpdate) {
            if (!fs.existsSync(doc)) continue;
            let content = fs.readFileSync(doc, 'utf8');
            let changed = false;

            // Atualiza a data de última atualização
            const updatedContent = content
              .replace(
                /\*\*Última Atualização:\*\* \d{4}-\d{2}-\d{2}/g,
                `**Última Atualização:** ${today}`
              )
              .replace(
                /\*\*Última revisão:\*\* .+/g,
                `**Última revisão:** ${todayBrt}`
              )
              .replace(
                /\*\*Próxima revisão agendada:\*\* \d{4}-\d{2}-\d{2}/g,
                `**Próxima revisão agendada:** ${nextReviewStr}`
              )
              .replace(
                /\*\*Próxima revisão programada:\*\* \d{4}-\d{2}-\d{2}/g,
                `**Próxima revisão programada:** ${nextReviewStr}`
              );

            if (updatedContent !== content) {
              fs.writeFileSync(doc, updatedContent, 'utf8');
              updated.push(doc);
              changed = true;
            }

            if (!changed) {
              console.log(`ℹ️  ${doc}: sem alterações de data`);
            }
          }

          if (updated.length > 0) {
            console.log(`✅ Documentos atualizados: ${updated.join(', ')}`);
          } else {
            console.log('ℹ️  Nenhum documento precisou de atualização.');
          }

          // Gerar arquivo de changelog automático
          const changelogPath = 'docs/CHANGELOG_AUTO.md';
          let changelog = '';
          if (fs.existsSync(changelogPath)) {
            changelog = fs.readFileSync(changelogPath, 'utf8');
          } else {
            changelog = `# Changelog Automático\n\nGerado automaticamente pelo workflow \`docs-update.yml\`.\n\n---\n\n`;
          }

          // Adiciona nova entrada no topo (após o header)
          const headerEnd = changelog.indexOf('---\n\n') + 5;
          if (securityChanges && securityChanges !== 'nenhuma') {
            const newEntry = `## ${today}\n\n- **Commit:** ${lastCommit}\n- **Arquivos de segurança alterados:** ${securityChanges}\n\n`;
            changelog = changelog.slice(0, headerEnd) + newEntry + changelog.slice(headerEnd);
            fs.mkdirSync('docs', { recursive: true });
            fs.writeFileSync(changelogPath, changelog, 'utf8');
            console.log(`✅ Changelog atualizado: ${changelogPath}`);
          }

          EOF

      - name: Verificar se houve mudanças nos docs
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff --name-only
          fi

      - name: Commit e push das atualizações de documentação
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SECURITY_CHECKLIST.md ANALISE_SEGURANCA_COMPLETA.md VALIDACAO_HARDENING.md INCIDENT_RESPONSE.md docs/CHANGELOG_AUTO.md || true
          git commit -m "docs: auto-update security documents [${{ steps.changes.outputs.TODAY }}]"
          git push
