name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (App + Functions)
        run: npm run typecheck:all

      - name: Secret Scan
        run: npm run secret-scan

      - name: Regression tests
        run: npm run test:regression

      - name: Security Check
        run: npm run security-check

      - name: Build
        run: npm run build
